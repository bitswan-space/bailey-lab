name: gitops Lint & Test

on:
  push:
    paths:
      - 'bitswan-gitops/**'
      - '.github/workflows/gitops-lint.yml'
  pull_request:
    paths:
      - 'bitswan-gitops/**'
      - '.github/workflows/gitops-lint.yml'

defaults:
  run:
    working-directory: bitswan-gitops

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: pip install .[dev]

    - name: Run linter
      run: |
        ruff check app
        ruff format --check

    - name: Run tests
      run: pytest tests -v
