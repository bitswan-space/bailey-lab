name: automation-server CalVer Release

on:
  push:
    branches: [main]
    paths:
      - 'bitswan-automation-server/**'
      - '.github/workflows/automation-server-release.yml'

permissions:
  contents: write
  packages: write

env:
  # Add your binary name once—used in several steps
  APP_NAME: bitswan-automation-server

defaults:
  run:
    working-directory: bitswan-automation-server

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      # 1) Checkout full history (tags included)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2) Set up Go tool-chain
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      # 3) Produce a Calendar Version string
      - name: Generate CalVer
        id: calver
        run: |
          DATE_VERSION=$(date +%Y.%m.%d)
          BUILD_NUMBER=${{ github.run_number }}
          echo "version=${DATE_VERSION}.${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"

      # 4) Make and push the tag
      - name: Create & push Git tag
        env:
          VERSION: ${{ steps.calver.outputs.version }}
        run: |
          git config --local user.email "action@example.com"
          git config --local user.name  "GitHub Action"
          git tag "v$VERSION"
          git push origin "v$VERSION"

      # 4.5) Build the embedded Server Console SPA. Its build output is not
      # committed (the daemon pulls it in via `go:embed serverconsole_dist`),
      # so without this step the released binary embeds only the .gitkeep
      # placeholder and bailey.<domain> / bailey-onboard.<domain> render an
      # empty directory listing instead of the console. Mirrors the test and
      # coverage workflows.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Server Console (embedded SPA)
        working-directory: ${{ github.workspace }}
        run: |
          npm --prefix bitswan-server-console install --no-audit --no-fund
          npm --prefix bitswan-server-console run build
          rm -rf bitswan-automation-server/internal/daemon/serverconsole_dist
          mkdir -p bitswan-automation-server/internal/daemon/serverconsole_dist
          cp -r bitswan-server-console/dist/. bitswan-automation-server/internal/daemon/serverconsole_dist/

      # 5) Build the shipped target
      - name: Build binaries
        env:
          VERSION: ${{ steps.calver.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          # Targets you want to ship. Only linux/amd64 is built: the daemon runs
          # in a linux/amd64 container and the host CLI is used on the same box,
          # so the other triples aren't shipped (some daemon code is Linux-only).
          TARGETS=(
            "linux/amd64"
          )
          for target in "${TARGETS[@]}"; do
            IFS="/" read -r GOOS GOARCH <<<"$target"
            BIN_NAME="${APP_NAME}-v${VERSION}-${GOOS}-${GOARCH}"
            EXT=""
            if [[ "$GOOS" == "windows" ]]; then EXT=".exe"; fi

            echo "→ building $BIN_NAME$EXT"
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH \
              go build -trimpath -ldflags "-X main.version=$VERSION -w -s -extldflags '-static'" \
              -a \
              -o "dist/$BIN_NAME$EXT" .

            # Compress
            if [[ "$GOOS" == "windows" ]]; then
              zip -j "dist/$BIN_NAME.zip" "dist/$BIN_NAME$EXT"
              rm "dist/$BIN_NAME$EXT"
            else
              tar -C dist -czf "dist/$BIN_NAME.tar.gz" "$BIN_NAME$EXT"
              rm "dist/$BIN_NAME$EXT"
            fi
          done

      # 6) Checksums (and optional signing)
      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > "${APP_NAME}_checksums.txt"

      # 7) Create the Release and upload every file in dist/
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION:   ${{ steps.calver.outputs.version }}
        run: |
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes "Automated CalVer release" \
            dist/*

      # 9) (Optional) Publish OCI images, Homebrew formula, etc.—add more steps here


