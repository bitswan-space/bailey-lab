name: automation-server Test and coverage

on:
  push:
    branches:
      - main
    paths:
      - 'bitswan-automation-server/**'
      - '.github/workflows/automation-server-test.yml'
  pull_request:
    paths:
      - 'bitswan-automation-server/**'
      - '.github/workflows/automation-server-test.yml'

defaults:
  run:
    working-directory: bitswan-automation-server

jobs:
  test:
    strategy:
      matrix:
        go-version: [1.25.x]
        # The automation-server daemon only ever runs on Linux (it reads
        # /proc + statfs and ships as a Linux container). macOS stays for
        # general cross-Unix portability; Windows is dropped — it can't build
        # the Unix-only syscalls and is not a supported runtime.
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # The daemon embeds the Server Console via go:embed; its build output is
      # not committed. Build the SPA so `go test` exercises the real assets.
      - name: Build Server Console (embedded SPA)
        working-directory: ${{ github.workspace }}
        run: |
          npm --prefix bitswan-server-console install --no-audit --no-fund
          npm --prefix bitswan-server-console run build
          rm -rf bitswan-automation-server/internal/daemon/serverconsole_dist
          mkdir -p bitswan-automation-server/internal/daemon/serverconsole_dist
          cp -r bitswan-server-console/dist/. bitswan-automation-server/internal/daemon/serverconsole_dist/

      - name: go get
        run: go get ./...

      - name: Run coverage
        run: go test -race -coverprofile="coverage.out" -covermode=atomic ./...

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        run: bash <(curl -s https://codecov.io/bash)

  integration-tests:
    runs-on: ubuntu-latest
    # Integration tests require Docker and root access

    services:
      docker:
        image: docker:dind
        options: --privileged

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Install Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose

      - name: Configure Docker
        run: |
          sudo mkdir -p /etc/docker
          echo '{"hosts": ["unix:///var/run/docker.sock", "tcp://0.0.0.0:2376"]}' | sudo tee /etc/docker/daemon.json
          sudo service docker start || true

      - name: Install and configure dnsmasq for .localhost resolution
        run: |
          sudo apt-get update
          sudo apt-get install -y dnsmasq
          # Stop systemd-resolved which might conflict with dnsmasq
          sudo systemctl stop systemd-resolved || true
          sudo systemctl disable systemd-resolved || true
          # Configure dnsmasq to resolve .localhost domains to 127.0.0.1
          sudo mkdir -p /etc/dnsmasq.d
          echo "address=/.localhost/127.0.0.1" | sudo tee /etc/dnsmasq.d/localhost.conf
          echo "listen-address=127.0.0.1" | sudo tee -a /etc/dnsmasq.d/localhost.conf
          echo "port=53" | sudo tee -a /etc/dnsmasq.d/localhost.conf
          echo "no-resolv" | sudo tee -a /etc/dnsmasq.d/localhost.conf
          echo "server=8.8.8.8" | sudo tee -a /etc/dnsmasq.d/localhost.conf
          echo "server=8.8.4.4" | sudo tee -a /etc/dnsmasq.d/localhost.conf
          # Test configuration
          sudo dnsmasq --test || true
          # Start dnsmasq
          sudo systemctl start dnsmasq || sudo dnsmasq --no-daemon --log-queries &
          # Update resolv.conf to use dnsmasq first, then fallback to Google DNS
          echo "nameserver 127.0.0.1" | sudo tee /etc/resolv.conf
          echo "nameserver 8.8.8.8" | sudo tee -a /etc/resolv.conf
          # Make resolv.conf immutable to prevent systemd-resolved from overwriting it
          sudo chattr +i /etc/resolv.conf || true
          # Verify dnsmasq is working
          sleep 3
          dig @127.0.0.1 test.localhost +short || nslookup test.localhost 127.0.0.1 || echo "DNS resolution check skipped"

      - name: Install and configure mkcert for TLS certificates
        run: |
          # Install mkcert
          sudo apt-get install -y libnss3-tools
          curl -JLO "https://dl.filippo.io/mkcert/latest?for=linux/amd64"
          chmod +x mkcert-v*-linux-amd64
          sudo mv mkcert-v*-linux-amd64 /usr/local/bin/mkcert
          # Initialize mkcert CA
          mkcert -install
          # Verify mkcert is working
          mkcert -CAROOT

      - name: Install and configure mkcert for TLS certificates
        run: |
          # Install mkcert
          sudo apt-get install -y libnss3-tools
          curl -JLO "https://dl.filippo.io/mkcert/latest?for=linux/amd64"
          chmod +x mkcert-v*-linux-amd64
          sudo mv mkcert-v*-linux-amd64 /usr/local/bin/mkcert
          # Generate local CA
          mkcert -install
          # Verify mkcert is working
          mkcert -CAROOT

      - name: Build bitswan binary
        run: go build -o bitswan ./main.go

      - name: Initialize daemon
        run: |
          sudo ./bitswan automation-server-daemon init
          # Fix permissions on config file so runner user can read it
          sudo chmod 644 /home/runner/.config/bitswan/automation_server_config.toml || true
          # Wait for daemon to be ready
          sleep 5
          # Verify daemon is running
          ./bitswan automation-server-daemon status || exit 1

      # Bring up Traefik ingress (Caddy is deprecated and no longer tested).
      # The business-process deploy e2e below then exercises this branch's
      # templates on top of Traefik.
      - name: "Ingress: Traefik init"
        timeout-minutes: 10
        run: |
          echo "=== Traefik ingress init ==="
          docker rm -f traefik 2>/dev/null || true
          docker compose -p bitswan-traefik down 2>/dev/null || true
          sudo rm -rf ~/.config/bitswan/traefik
          ./bitswan ingress init --type traefik -v || exit 1
          docker ps | grep traefik || { echo "ERROR: Traefik not running"; exit 1; }
          echo "Routes:"
          ./bitswan ingress list-routes || true

      - name: Build gitops image from source
        run: |
          # Build a fresh gitops image from this monorepo's source so the e2e
          # exercises the in-repo gitops (and its baked example templates), not
          # a published image. Absolute path: this job's default working dir is
          # bitswan-automation-server.
          docker build -t bitswan/gitops-local:latest -f "${{ github.workspace }}/bitswan-gitops/Dockerfile" "${{ github.workspace }}"

      - name: Build coding-agent image from source
        run: |
          # Build the in-repo coding-agent so the e2e exercises this branch's
          # CLI (e.g. the `--copy` flag / `?copy=` gitops calls), not a
          # published image that may lag the gitops/daemon API.
          docker build -t bitswan/coding-agent-local:latest -f "${{ github.workspace }}/bitswan-coding-agent/Dockerfile" "${{ github.workspace }}/bitswan-coding-agent"

      - name: Build egress-gateway image from source
        run: |
          # Dev deployments now stand up a default monitor-mode egress firewall
          # gateway (observe-only, zero blast radius), and the BP worker shares
          # its netns + gates its start on the gateway becoming healthy. gitops
          # references the gateway by BITSWAN_EGRESS_GATEWAY_IMAGE (default
          # bitswan/egress-gateway:latest), so build that tag here or the deploy
          # can't pull it and every BP deploy fails.
          docker build -t bitswan/egress-gateway:latest -f "${{ github.workspace }}/bitswan-automation-server/cmd/egress-gateway/Dockerfile" "${{ github.workspace }}/bitswan-automation-server"

      - name: Build automation-server-runtime image from source
        run: |
          # The per-workspace infra-driver sidecar runs this image (debian +
          # docker CLI + git + git-http-backend) with the bitswan binary mounted
          # at runtime. The workspace compose references it as
          # bitswan/automation-server-runtime:latest and brings it up with
          # `--pull missing`, so build the tag here or the sidecar can't start
          # and `docker compose up` fails.
          docker build -t bitswan/automation-server-runtime:latest -f "${{ github.workspace }}/bitswan-automation-server/Dockerfile" "${{ github.workspace }}/bitswan-automation-server"

      - name: "E2E: create a business process and reach its frontend"
        timeout-minutes: 15
        run: |
          echo "=== Creating a business process and verifying the frontend ==="
          ./bitswan _test init --gitops-image bitswan/gitops-local:latest --coding-agent-image bitswan/coding-agent-local:latest --no-remove || exit 1
          ./bitswan _test cleanup || true

      - name: "Diagnostics on E2E failure"
        if: failure()
        run: |
          echo "::group::docker ps -a"
          docker ps -a || true
          echo "::endgroup::"
          # --no-remove leaves the workspace up on failure; dump every
          # container's recent logs (gitops deploy pipeline + the BP's
          # frontend/backend containers are what we need).
          for c in $(docker ps -aq); do
            name=$(docker inspect --format '{{.Name}} ({{.State.Status}}, exit={{.State.ExitCode}})' "$c" 2>/dev/null || echo "$c")
            echo "::group::logs $name"
            docker logs --tail 200 "$c" 2>&1 || true
            echo "::endgroup::"
          done
          # The deployed bitswan.yaml (does the deployment declare services?) and
          # the driver-generated compose (was postgres/minio merged in?).
          for c in $(docker ps -aq --filter "name=bitswan-gitops"); do
            echo "::group::deployed bitswan.yaml + compose ($c)"
            docker exec "$c" sh -c 'echo "--- bitswan.yaml ---"; cat /gitops/gitops/bitswan.yaml 2>/dev/null; echo "--- docker-compose.yaml ---"; cat /gitops/gitops/docker-compose.yaml 2>/dev/null' 2>&1 || true
            echo "::endgroup::"
          done

      - name: Final cleanup
        if: always()
        run: |
          ./bitswan _test cleanup || true
