syntax = "proto3";

// Package infradriver.v1 is the backend-agnostic contract between gitops and
// an infrastructure driver. gitops never speaks Docker (or Kubernetes); it
// ships declarative INTENT — the workspace's bitswan.yaml plus the context the
// driver needs to compile it — and the driver realizes that intent against a
// concrete backend.
//
// The driver is a "compiler for bitswan.yaml": given the workspace's declared
// deployments/infra/firewall/backups, it computes the desired backend state and
// reconciles to it. The Docker driver compiles to a docker-compose project +
// networks + sidecars; a future Kubernetes driver compiles the SAME intent to
// Deployments/Services/NetworkPolicies — with no change to gitops.
//
// Surface is intentionally tiny: Apply does the bulk (compile + reconcile);
// the rest are the few imperative operations that can't be expressed purely
// declaratively (build a source image, dump/restore data, stream logs/events).
package infradriver.v1;

option go_package = "github.com/bitswan-space/bitswan-workspaces/internal/infradriver/proto/v1;infradriverv1";

// InfraDriver is served by the driver over a private UNIX socket shared only
// with its paired gitops (and the daemon). It is never network-reachable, and
// the driver is the sole holder of the Docker socket.
service InfraDriver {
  // Apply compiles the workspace's bitswan.yaml and reconciles the backend to
  // it: create/repoint/remove networks, services, sidecars and routes so the
  // running state matches the declaration. Idempotent — a no-op re-apply makes
  // no changes. Streams human-readable progress (the deploy/promote/swap/scale
  // UIs render these) and ends with a terminal Done or Failed.
  rpc Apply(ApplyRequest) returns (stream Progress);

  // BuildImage bakes a source tree into an image (content-addressed by source
  // hash; a cache hit returns immediately). The Docker driver runs a build; a
  // k8s driver would delegate to a build service.
  rpc BuildImage(BuildImageRequest) returns (stream BuildProgress);

  // Snapshot / Restore dump and load a deployment's data services (postgres,
  // couchdb, minio). The driver execs the dump/restore inside the data
  // containers (k8s: a Job) and streams bytes through the gateway.
  rpc Snapshot(SnapshotRequest) returns (stream Progress);
  rpc Restore(RestoreRequest) returns (stream Progress);

  // Status returns the current realized state of a deployment (per-replica
  // health, image, slot) so gitops can answer the dashboard without Docker.
  rpc Status(StatusRequest) returns (DeploymentStatus);

  // Logs streams a container's logs.
  rpc Logs(LogsRequest) returns (stream LogLine);

  // WatchEvents streams backend state-change events (container up/down) so
  // gitops can invalidate its caches without polling Docker.
  rpc WatchEvents(WatchEventsRequest) returns (stream Event);
}

// WorkspaceContext is everything the compiler needs that is NOT in bitswan.yaml.
// Secrets are passed by REFERENCE (the driver and gitops share the secrets
// volume read-only); plaintext never crosses the wire.
message WorkspaceContext {
  string workspace_name = 1;   // e.g. "acme"
  string domain = 2;           // e.g. "acme.example.com"
  string gitops_dir = 3;       // path on the shared volume: bitswan.yaml + copies/ + repo
  string secrets_dir = 4;      // path on the shared volume holding decrypted secret material
  bool wrap_available = 5;     // protected-proxy present → wrap topology; else bare two-tier
}

message ApplyRequest {
  WorkspaceContext ctx = 1;
  // The verbatim bitswan.yaml. The driver is the sole interpreter of its
  // schema (deployments, backups/blue-green, firewall, infra deps). gitops does
  // not parse it for compose purposes.
  string bitswan_yaml = 2;
  // Optional: limit reconciliation to these deployment ids (a single BP / stage
  // deploy). Empty = the whole workspace.
  repeated string only_deployment_ids = 3;
}

message BuildImageRequest {
  WorkspaceContext ctx = 1;
  string source_path = 2;      // build context on the shared volume
  string base_image = 3;
  string mount_path = 4;       // where the source is COPY'd in the image
  string source_sha = 5;       // content address; drives the cache + the tag
}

message SnapshotRequest {
  WorkspaceContext ctx = 1;
  string bp = 2;
  string stage = 3;
  string snapshot_id = 4;
}

message RestoreRequest {
  WorkspaceContext ctx = 1;
  string bp = 2;
  string from_stage = 3;
  string to_stage = 4;
  string snapshot_id = 5;
}

message StatusRequest {
  WorkspaceContext ctx = 1;
  repeated string deployment_ids = 2; // empty = all
}

message LogsRequest {
  WorkspaceContext ctx = 1;
  string container = 2;
  int32 tail = 3;
  bool follow = 4;
}

message WatchEventsRequest {
  WorkspaceContext ctx = 1;
}

// Progress is one streamed step of an Apply/Snapshot/Restore. step is a stable
// machine key (e.g. "generating_compose", "reconciling_ingress",
// "provisioning_services", "installing_certs", "starting_oauth2_proxy") and
// message is the human line. Exactly one terminal frame ends the stream.
message Progress {
  string step = 1;
  string message = 2;
  oneof terminal {
    Done done = 10;
    Failed failed = 11;
  }
}

message BuildProgress {
  string message = 1;
  oneof terminal {
    ImageRef built = 10; // success
    Failed failed = 11;
  }
}

message ImageRef {
  string full_tag = 1;
  string image_id = 2;
  bool cache_hit = 3;
}

message Done {
  // Routes the driver realized (so gitops can keep its own view in sync). For
  // the Docker driver these are the ingress routes; gitops still owns the
  // daemon ingress reconcile call.
  repeated Route routes = 1;
}

message Failed {
  string error = 1;
}

message Route {
  string hostname = 1;
  string upstream = 2;
  string stage = 3;
}

message DeploymentStatus {
  repeated DeploymentState states = 1;
}

message DeploymentState {
  string deployment_id = 1;
  string stage = 2;
  string image = 3;
  int32 replicas = 4;
  string health = 5; // "healthy" | "starting" | "not_running" | "unknown"
  string slot = 6;   // blue-green slot, if any
}

message LogLine {
  string line = 1;
  bool stderr = 2;
}

message Event {
  string container = 1;
  string action = 2; // "start" | "die" | "health_status" | ...
}
